sonar.organization=kousen-it-inc
sonar.projectKey=kousen_mockhub
sonar.projectName=MockHub
sonar.host.url=https://sonarcloud.io

# Sources — both backend (Java) and frontend (TypeScript)
sonar.sources=backend/src/main/java,frontend/src
sonar.tests=backend/src/test/java,frontend/src
sonar.test.inclusions=**/*Test.java,**/*.test.ts,**/*.test.tsx,**/*.spec.ts
sonar.java.binaries=backend/build/classes/java/main
sonar.java.test.binaries=backend/build/classes/java/test

# Coverage reports
sonar.coverage.jacoco.xmlReportPaths=backend/build/reports/jacoco/test/jacocoTestReport.xml
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

# Exclusions (generated code, config, test fixtures)
sonar.exclusions=\
  **/node_modules/**,\
  **/build/**,\
  **/dist/**,\
  frontend/src/components/ui/**,\
  **/*.config.*

# Coverage exclusions — exclude from coverage calculation (still analyzed for issues)
sonar.coverage.exclusions=\
  **/seed/**,\
  **/entity/**,\
  **/dto/**,\
  **/config/AiConfig.java,\
  **/MockHubApplication.java,\
  **/test/setup.ts,\
  **/test/test-utils.tsx,\
  **/test/mocks/**

# Issue exclusions — suppress known false positives
sonar.issue.ignore.multicriteria=e1,e2,e3,e4,e5,e6,e7

# S1186: Empty method body — JPA requires protected no-arg constructors on entities
sonar.issue.ignore.multicriteria.e1.ruleKey=java:S1186
sonar.issue.ignore.multicriteria.e1.resourceKey=**/entity/**

# S1192: Duplicated string literals in seed data
sonar.issue.ignore.multicriteria.e2.ruleKey=java:S1192
sonar.issue.ignore.multicriteria.e2.resourceKey=**/seed/**

# S1192: Duplicated string literals in SQL migrations
sonar.issue.ignore.multicriteria.e3.ruleKey=plsql:S1192
sonar.issue.ignore.multicriteria.e3.resourceKey=**/migration/**

# S3776: Cognitive complexity in seed data
sonar.issue.ignore.multicriteria.e4.ruleKey=java:S3776
sonar.issue.ignore.multicriteria.e4.resourceKey=**/seed/**

# S6218: Record with byte[] — TicketPdfData is internal, never compared/hashed
sonar.issue.ignore.multicriteria.e5.ruleKey=java:S6218
sonar.issue.ignore.multicriteria.e5.resourceKey=**/ticket/dto/**

# S6863: Verification endpoint intentionally returns 200 for all cases — validity is in the response body
sonar.issue.ignore.multicriteria.e6.ruleKey=java:S6863
sonar.issue.ignore.multicriteria.e6.resourceKey=**/ticket/controller/TicketVerificationController.java

# S7746: throw vs Promise.reject in Axios interceptors — style preference
sonar.issue.ignore.multicriteria.e7.ruleKey=typescript:S7746
sonar.issue.ignore.multicriteria.e7.resourceKey=**/api/client.ts

# Encoding
sonar.sourceEncoding=UTF-8
