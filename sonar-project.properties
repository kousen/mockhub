sonar.organization=kousen-it-inc
sonar.projectKey=kousen_mockhub
sonar.projectName=MockHub

# Sources
sonar.sources=backend/src/main/java,frontend/src
sonar.tests=backend/src/test/java,frontend/src
sonar.test.inclusions=**/*Test.java,**/*.test.ts,**/*.test.tsx,**/*.spec.ts

# Java
sonar.java.binaries=backend/build/classes
sonar.java.libraries=backend/build/sonar-libs/**/*.jar

# Coverage reports
sonar.coverage.jacoco.xmlReportPaths=backend/build/reports/jacoco/test/jacocoTestReport.xml
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

# Exclusions (generated code, config, test fixtures)
sonar.exclusions=\
  **/node_modules/**,\
  **/build/**,\
  **/dist/**,\
  frontend/src/components/ui/**,\
  **/seed/*.json,\
  **/*.config.*

# Issue exclusions
# S1192: Duplicated string literals — mostly seed data with repeated venue/event names, not worth extracting
# S1186: Empty method body — JPA requires protected no-arg constructors on entities
# S3776: Cognitive complexity — seed data methods are inherently procedural
sonar.issue.ignore.multicriteria=e1,e2,e3,e4,e5

# Duplicated strings in seed data
sonar.issue.ignore.multicriteria.e1.ruleKey=java:S1192
sonar.issue.ignore.multicriteria.e1.resourceKey=**/seed/**

# Duplicated strings in SQL migrations
sonar.issue.ignore.multicriteria.e2.ruleKey=plsql:S1192
sonar.issue.ignore.multicriteria.e2.resourceKey=**/migration/**

# Empty JPA constructors across all entities
sonar.issue.ignore.multicriteria.e3.ruleKey=java:S1186
sonar.issue.ignore.multicriteria.e3.resourceKey=**/entity/**

# Cognitive complexity in seed data
sonar.issue.ignore.multicriteria.e4.ruleKey=java:S3776
sonar.issue.ignore.multicriteria.e4.resourceKey=**/seed/**

# throw vs Promise.reject in Axios interceptors — style preference
sonar.issue.ignore.multicriteria.e5.ruleKey=typescript:S7746
sonar.issue.ignore.multicriteria.e5.resourceKey=**/api/client.ts

# Encoding
sonar.sourceEncoding=UTF-8
