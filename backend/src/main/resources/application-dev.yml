spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:mockhub}
    username: ${DB_USERNAME:mockhub}
    password: ${DB_PASSWORD:mockhub_dev}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true

mockhub:
  mcp:
    enabled: true
  ticket:
    # Base64 of "dev-only-ticket-signing-secret-not-for-production"
    signing-secret: ZGV2LW9ubHktdGlja2V0LXNpZ25pbmctc2VjcmV0LW5vdC1mb3ItcHJvZHVjdGlvbg==
  jwt:
    # Base64 of "dev-only-jwt-secret-key-not-for-production-use-only"
    secret: ZGV2LW9ubHktand0LXNlY3JldC1rZXktbm90LWZvci1wcm9kdWN0aW9uLXVzZS1vbmx5

logging:
  level:
    com.mockhub: DEBUG
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
