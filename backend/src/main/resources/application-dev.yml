spring:
  profiles:
    include:
      - mock-payment

  datasource:
    url: jdbc:h2:mem:mockhub;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: true

  h2:
    console:
      enabled: true
      path: /h2-console

  ai:
    vectorstore:
      pgvector:
        initialize-schema: false

logging:
  level:
    com.mockhub: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
