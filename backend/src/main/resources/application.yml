spring:
  application:
    name: mockhub
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
    group:
      dev: dev,mock-payment,mock-sms,mock-email,mock-spotify

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:placeholder}
            client-secret: ${GOOGLE_CLIENT_SECRET:placeholder}
            scope: openid,profile,email
          github:
            client-id: ${GITHUB_CLIENT_ID:placeholder}
            client-secret: ${GITHUB_CLIENT_SECRET:placeholder}
            scope: user:email
          spotify:
            client-id: ${SPOTIFY_CLIENT_ID:placeholder}
            client-secret: ${SPOTIFY_CLIENT_SECRET:placeholder}
            scope: user-read-email
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
        provider:
          spotify:
            authorization-uri: https://accounts.spotify.com/authorize
            token-uri: https://accounts.spotify.com/api/token
            user-info-uri: https://api.spotify.com/v1/me
            user-name-attribute: id

  autoconfigure:
    exclude:
      - org.springframework.ai.model.anthropic.autoconfigure.AnthropicChatAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiChatAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiEmbeddingAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiImageAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioSpeechAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioTranscriptionAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiModerationAutoConfiguration
      - org.springframework.ai.model.ollama.autoconfigure.OllamaChatAutoConfiguration
      - org.springframework.ai.model.ollama.autoconfigure.OllamaEmbeddingAutoConfiguration
      - org.springframework.ai.model.ollama.autoconfigure.OllamaApiAutoConfiguration
      - org.springframework.ai.model.chat.client.autoconfigure.ChatClientAutoConfiguration

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  ai:
    mcp:
      server:
        enabled: ${mockhub.mcp.enabled:false}
        name: mockhub-mcp-server
        version: 0.0.1
        protocol: STREAMABLE

server:
  port: 8080

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method

mockhub:
  mcp:
    enabled: false
    api-key: ${MCP_API_KEY:mockhub-dev-key}
  eval:
    ai-judge:
      enabled: ${MOCKHUB_EVAL_AI_JUDGE_ENABLED:false}
    price-plausibility:
      min-ratio: 0.1
      max-ratio: 10.0
  ticket:
    signing-secret: ${TICKET_SIGNING_SECRET}
    verification-base-url: ${TICKET_VERIFICATION_URL:http://localhost:8080}
  sms:
    from-number: ${TWILIO_PHONE_NUMBER:+10000000000}
    order-base-url: ${SMS_ORDER_BASE_URL:http://localhost:5173}
  email:
    from-address: ${EMAIL_FROM_ADDRESS:noreply@mockhub.dev}
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiration-ms: 900000
    refresh-token-expiration-ms: 604800000
  cookie:
    secure: ${COOKIE_SECURE:false}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173}
  pricing:
    service-fee-percent: 15.0
    min-multiplier: 0.5
    max-multiplier: 5.0
  spotify:
    client-id: ${SPOTIFY_CLIENT_ID:}
    client-secret: ${SPOTIFY_CLIENT_SECRET:}
    token-encryption-key: ${SPOTIFY_TOKEN_ENCRYPTION_KEY:}
  oauth2:
    frontend-redirect-url: ${OAUTH2_FRONTEND_REDIRECT_URL:http://localhost:5173}
  images:
    upload-dir: ${UPLOAD_DIR:./uploads}
    max-size-mb: 10
    thumbnail-width: 300
    thumbnail-height: 200

stripe:
  secret-key: ${STRIPE_SECRET_KEY:sk_test_placeholder}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_placeholder}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
