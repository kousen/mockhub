spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:mockhub}
    username: ${DB_USERNAME:mockhub}
    password: ${DB_PASSWORD:mockhub_dev}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true

  ai:
    vectorstore:
      pgvector:
        initialize-schema: false

mockhub:
  mcp:
    enabled: true

logging:
  level:
    com.mockhub: DEBUG
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
