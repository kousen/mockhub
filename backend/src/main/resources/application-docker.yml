spring:
  profiles:
    include:
      - stripe

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:mockhub}
    username: ${DB_USERNAME:mockhub}
    password: ${DB_PASSWORD:mockhub}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true

logging:
  level:
    com.mockhub: INFO
    org.springframework: WARN
